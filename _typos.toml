# SYNAPSE CHANNEL — typos configuration

[default.extend-words]
# Domain terms that are not typos.
ndjson = "ndjson"
tiktoken = "tiktoken"
# TPM 2.0 API type names (tpm2-pytss): the TPM spec abbreviates "parameters" as PARMS
# (TPMU_PUBLIC_PARMS, TPMS_RSA_PARMS), so it is a verbatim external identifier, not a typo.
parms = "parms"

[files]
extend-exclude = [
    "*.db",
    "*.ndjson",
    "benchmarks/results/*.json",
    # Signatures are opaque base64url and cannot be spell-corrected.
    "tests/fixtures/aef_receipt_v0_1.json",
    # Translated READMEs are non-English by definition; the checker's English
    # dictionary misreads legitimate foreign words (e.g. French "sur") as typos.
    "docs/readme/*.md",
]
