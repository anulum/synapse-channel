# SYNAPSE CHANNEL — gitleaks secret-scanning configuration

[extend]
useDefault = true

[allowlist]
description = """NumPy docstring type annotations ('private_key : Ed25519PrivateKey') \
trip the generic-api-key heuristic; the captured 'secret' is the type name itself. \
'atelier-signing-2026' is the public signing-key *identifier* in the federation \
ceremony walkthrough (docs/federated-trust-model.md) — a label printed by design, \
not key material. Build artefacts and bytecode mirror the same source lines and \
are gitignored."""
regexes = ['''^Ed25519PrivateKey$''', '''^atelier-signing-2026$''']
paths = [
    '''^build/''',
    '''__pycache__/''',
]
