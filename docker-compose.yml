# SYNAPSE CHANNEL — compose file for the coordination hub

services:
  hub:
    build: .
    image: ghcr.io/anulum/synapse-channel:latest
    container_name: synapse-hub
    restart: unless-stopped
    # Loopback-only on the host: the hub is reachable at 127.0.0.1:8876 on this
    # machine and nowhere else. To reach it from other hosts, change to "8876:8876"
    # AND set a token (uncomment the --token command below) — never expose it open.
    #
    # The publish flags bound HOST ingress only. Containers are a separate
    # audience: anything attached to the hub-isolated network below reaches the
    # hub on hub:8876 directly, regardless of this loopback publish.
    ports:
      - "127.0.0.1:8876:8876"
    networks:
      - hub-isolated
    volumes:
      - synapse-data:/data
    # The hub must bind 0.0.0.0 *inside* the container for the published port to
    # reach it; --insecure-off-loopback accepts that bind. It is safe here only
    # because BOTH audiences are bounded: the publish above is loopback-only
    # (host ingress), and hub-isolated below carries no other service (container
    # peers). The moment you expose the port beyond 127.0.0.1, or attach any
    # container you do not fully trust to hub-isolated, drop
    # --insecure-off-loopback and require a token instead (see the commented lines).
    command:
      - hub
      - --host=0.0.0.0
      - --port=8876
      # Bind the WebSocket Host guard to the loopback authority published above.
      - --advertised-host=127.0.0.1:8876
      - --db=/data/hub.db
      - --relay-log=/data/feed.ndjson
      - --insecure-off-loopback
      # Exposing the port beyond loopback, or sharing hub-isolated with other
      # containers? Replace --insecure-off-loopback with:
      # - --token=${SYNAPSE_TOKEN}

networks:
  # Dedicated single-service network. Any container joined here can reach the
  # unauthenticated hub on hub:8876 at the TCP layer regardless of host publish
  # flags. The shipped Host guard admits only 127.0.0.1:8876, so peers receive
  # 403 until the operator configures their concrete authority.
  # Therefore, keep untrusted services off this network — or add the --token line above.
  hub-isolated:
    driver: bridge

volumes:
  synapse-data:
