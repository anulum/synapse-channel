# SYNAPSE CHANNEL — strict cockpit unit, build, accessibility, and browser gate
name: clients-cockpit

on:
  push:
    paths:
      - "clients/cockpit/**"
      - "clients/cockpit/package-lock.json"
      - "src/synapse_channel/dashboard.py"
      - "src/synapse_channel/dashboard_bind.py"
      - "src/synapse_channel/dashboard_feed_serving.py"
      - "src/synapse_channel/dashboard_operator_writes.py"
      - "src/synapse_channel/cli_dashboard.py"
      - "src/synapse_channel/dashboard_assets/**"
      - "pyproject.toml"
      - ".github/requirements/requirements.txt"
      - ".github/workflows/clients-cockpit.yml"
  pull_request:
    paths:
      - "clients/cockpit/**"
      - "clients/cockpit/package-lock.json"
      - "src/synapse_channel/dashboard.py"
      - "src/synapse_channel/dashboard_bind.py"
      - "src/synapse_channel/dashboard_feed_serving.py"
      - "src/synapse_channel/dashboard_operator_writes.py"
      - "src/synapse_channel/cli_dashboard.py"
      - "src/synapse_channel/dashboard_assets/**"
      - "pyproject.toml"
      - ".github/requirements/requirements.txt"
      - ".github/workflows/clients-cockpit.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: clients/cockpit/package-lock.json
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r .github/requirements/requirements.txt
      - run: python -m pip install -e . --no-deps
      - run: npm ci
        working-directory: clients/cockpit
      - run: npm run typecheck
        working-directory: clients/cockpit
      - run: npm run coverage
        working-directory: clients/cockpit
      - run: npm run build
        working-directory: clients/cockpit
      - name: Install Chromium for the production browser gate
        run: npx playwright install --with-deps chromium
        working-directory: clients/cockpit
      - name: Exercise auth, operator write, and accessibility in the built cockpit
        run: npm run e2e
        working-directory: clients/cockpit
      - name: Upload the disposable-token browser failure trace
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cockpit-playwright-failure-${{ github.run_attempt }}
          path: |
            clients/cockpit/test-results/
            clients/cockpit/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
