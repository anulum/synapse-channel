# SYNAPSE CHANNEL — build the container image (publish to GHCR on a release)
name: docker

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - docker-compose.yml
      - "src/**"
      - pyproject.toml
      - .github/workflows/docker.yml
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - docker-compose.yml
      - "src/**"
      - pyproject.toml
      - .github/workflows/docker.yml
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Immutable vX.Y.Z tag to publish to GHCR.
        required: true
        type: string

permissions:
  contents: read

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.release_tag || github.ref }}
          fetch-depth: 1
          fetch-tags: true
      - name: Validate the dispatched release tag
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi
          tag_commit="$(git rev-list -n 1 "$RELEASE_TAG")"
          if [[ "$tag_commit" != "$(git rev-parse HEAD)" ]]; then
            echo "$RELEASE_TAG does not resolve to the checked-out commit" >&2
            exit 1
          fi
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Log in to GHCR
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        id: meta
        with:
          images: ghcr.io/anulum/synapse-channel
          tags: |
            type=ref,event=tag
            type=raw,value=${{ inputs.release_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' || github.event_name == 'release' }}
      - name: Build (and push on release)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  compose-smoke:
    # Exercise the shipped docker-compose.yml exactly as an operator would: build
    # the image, bring the hub up, and wait for its container HEALTHCHECK
    # (`synapse health`) to pass. Proves the compose file and the image's default
    # hub command still start a reachable hub, not only that the image builds.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.release_tag || github.ref }}
      - name: Bring the hub up and wait for it to become healthy
        run: docker compose up --detach --build --wait --wait-timeout 180
      - name: Confirm the hub answers a health probe
        run: docker compose exec -T hub synapse health --uri ws://127.0.0.1:8876
      - name: Show hub logs on failure
        if: failure()
        run: docker compose logs hub
      - name: Tear down
        if: always()
        run: docker compose down --volumes
