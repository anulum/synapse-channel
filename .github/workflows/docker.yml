# SYNAPSE CHANNEL — build the container image (publish to GHCR on a release)
name: docker

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - "src/**"
      - pyproject.toml
      - .github/workflows/docker.yml
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - "src/**"
      - pyproject.toml
  release:
    types: [published]

permissions:
  contents: read

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/anulum/synapse-channel
      - name: Build (and push on release)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'release' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
