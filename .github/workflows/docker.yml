# SYNAPSE CHANNEL — build the container image (publish to GHCR on a release)
name: docker

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - docker-compose.yml
      - "src/**"
      - pyproject.toml
      - .github/workflows/docker.yml
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - docker-compose.yml
      - "src/**"
      - pyproject.toml
      - .github/workflows/docker.yml
  release:
    types: [published]

permissions:
  contents: read

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Log in to GHCR
        if: github.event_name == 'release'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        id: meta
        with:
          images: ghcr.io/anulum/synapse-channel
      - name: Build (and push on release)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: ${{ github.event_name == 'release' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  compose-smoke:
    # Exercise the shipped docker-compose.yml exactly as an operator would: build
    # the image, bring the hub up, and wait for its container HEALTHCHECK
    # (`synapse health`) to pass. Proves the compose file and the image's default
    # hub command still start a reachable hub, not only that the image builds.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Bring the hub up and wait for it to become healthy
        run: docker compose up --detach --build --wait --wait-timeout 180
      - name: Confirm the hub answers a health probe
        run: docker compose exec -T hub synapse health
      - name: Show hub logs on failure
        if: failure()
        run: docker compose logs hub
      - name: Tear down
        if: always()
        run: docker compose down --volumes
