# SYNAPSE CHANNEL — pre-commit hook gate
name: pre-commit

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r .github/requirements/requirements-dev.txt
      - run: python -m pip install -e . --no-deps
      - run: python -m pre_commit run --all-files --show-diff-on-failure
      # The pre-commit gitleaks hook scans staged changes, which an
      # --all-files CI run leaves empty; this sweep covers the whole
      # checkout so a secret already in the tree cannot hide.
      - name: gitleaks full-tree sweep
        run: >
          docker run --rm -v "$PWD:/repo:ro"
          ghcr.io/gitleaks/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
          dir --redact --no-banner /repo
