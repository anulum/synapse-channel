# SYNAPSE CHANNEL — pre-commit hook gate
name: pre-commit

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure
