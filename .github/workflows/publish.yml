# SYNAPSE CHANNEL — publish to PyPI when a release tag is pushed
name: publish

# Trigger on the tag push itself, not on `release: published`. release.yml
# creates the GitHub Release with the default GITHUB_TOKEN, and GitHub does not
# run workflows from events a GITHUB_TOKEN created (its loop guard), so a
# `release: published` trigger never fired and every release had to be published
# to PyPI by hand. The tag push is a real event that fires both release.yml and
# this workflow in parallel. Trusted publishing is bound to (repository, this
# workflow file, the `pypi` environment), not to the trigger, so OIDC still
# authenticates.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true
