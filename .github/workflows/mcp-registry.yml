# SYNAPSE CHANNEL — publish immutable release metadata to the official MCP Registry
name: mcp-registry

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Immutable vX.Y.Z tag whose server.json should be published.
        required: true
        type: string

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: refs/tags/${{ inputs.release_tag }}
          fetch-depth: 1
          fetch-tags: true
      - name: Validate the immutable release tag
        id: release
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi
          tag_ref="refs/tags/$RELEASE_TAG"
          if ! git show-ref --verify --quiet "$tag_ref"; then
            echo "release tag does not exist: $tag_ref" >&2
            exit 1
          fi
          tag_commit="$(git rev-parse "$tag_ref^{commit}")"
          if [[ "$tag_commit" != "$(git rev-parse HEAD)" ]]; then
            echo "$RELEASE_TAG does not resolve to the checked-out commit" >&2
            exit 1
          fi
          version="${RELEASE_TAG#v}"
          metadata_version="$(python -c 'import json; print(json.load(open("server.json", encoding="utf-8"))["version"])')"
          if [[ "$metadata_version" != "$version" ]]; then
            echo "server.json version $metadata_version does not match $RELEASE_TAG" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Verify the released package boundary
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: >-
          PYTHONPATH=. python tools/verify_mcp_registry_release.py
          --phase package --expect-version "$RELEASE_VERSION" --json
      - name: Install the audited official publisher
        run: |
          curl --proto '=https' --tlsv1.2 -fL -o mcp-publisher_linux_amd64.tar.gz \
            https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz
          printf '%s  %s\n' \
            ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac \
            mcp-publisher_linux_amd64.tar.gz | sha256sum --check --strict -
          tar -xzf mcp-publisher_linux_amd64.tar.gz mcp-publisher
          ./mcp-publisher --version
          ./mcp-publisher validate server.json
      - name: Check for an already-published immutable version
        id: existing
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          if PYTHONPATH=. python tools/verify_mcp_registry_release.py \
            --phase registry --expect-version "$RELEASE_VERSION" --json; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Authenticate with GitHub Actions OIDC
        if: steps.existing.outputs.published != 'true'
        run: ./mcp-publisher login github-oidc
      - name: Publish server metadata
        if: steps.existing.outputs.published != 'true'
        run: ./mcp-publisher publish server.json
      - name: Verify the public registry record
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          for attempt in 1 2 3 4 5 6; do
            if PYTHONPATH=. python tools/verify_mcp_registry_release.py \
              --phase registry --expect-version "$RELEASE_VERSION" --json; then
              exit 0
            fi
            if [[ "$attempt" -lt 6 ]]; then
              sleep 10
            fi
          done
          exit 1
