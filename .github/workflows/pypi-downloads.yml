# SYNAPSE CHANNEL — daily PyPI download snapshot recorded to the metrics branch
name: pypi-downloads

on:
  schedule:
    # Daily at 06:17 UTC — off the hour so the upstream dataset has refreshed.
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pypi-downloads
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Snapshot downloads onto the metrics branch
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          package="$(python tools/pypi_downloads.py --print-package)"
          remote="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          # Keep the snapshots on a side branch so the default branch stays clean.
          if git ls-remote --exit-code --heads "$remote" metrics >/dev/null 2>&1; then
            git clone --depth 1 --branch metrics "$remote" metrics-branch
          else
            git clone --depth 1 "$remote" metrics-branch
            git -C metrics-branch switch --orphan metrics
            git -C metrics-branch rm -rf . >/dev/null 2>&1 || true
          fi
          python tools/pypi_downloads.py \
            --package "$package" \
            --csv "metrics-branch/downloads/${package}.csv"
          cd metrics-branch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "downloads/${package}.csv"
          if git diff --cached --quiet; then
            echo "No download changes to record."
            exit 0
          fi
          git commit -m "metrics: pypi download snapshot for ${package}"
          git push origin metrics
