# SYNAPSE CHANNEL — daily PyPI download snapshot (main seed + artifact; no metrics branch push)
#
# Canonical series seed: downloads/<package>.csv on the default branch.
# Daily runs upsert into the workspace copy and upload a pinned artifact (retention 90 days).
# Governed compact-land: a non-author lander must refresh the main seed from the latest
# artifact (or re-run of this tool) at least every 90 days and before every release tag.
# Do not delete origin/metrics until seed+workflow are green and the bundle archive exists.
name: pypi-downloads

on:
  schedule:
    # Daily at 06:17 UTC — off the hour so the upstream dataset has refreshed.
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pypi-downloads
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the default branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Snapshot downloads into the main CSV seed
        id: snapshot
        run: |
          set -euo pipefail
          package="$(python tools/pypi_downloads.py --print-package)"
          csv_path="downloads/${package}.csv"
          mkdir -p downloads
          python tools/pypi_downloads.py \
            --package "$package" \
            --csv "$csv_path"
          echo "package=${package}" >> "$GITHUB_OUTPUT"
          echo "csv_path=${csv_path}" >> "$GITHUB_OUTPUT"
          if git diff --quiet -- "$csv_path"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload download series artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pypi-downloads-${{ steps.snapshot.outputs.package }}
          path: ${{ steps.snapshot.outputs.csv_path }}
          if-no-files-found: error
          retention-days: 90
      - name: Note compact-land obligation
        if: steps.snapshot.outputs.changed == 'true'
        run: |
          echo "CSV seed changed in this workspace run."
          echo "A governed non-author compact-land must merge the updated series to main"
          echo "within 90 days and before the next release tag (no bot self-land)."
