# SYNAPSE CHANNEL — pinned real editor clients against OpenCode ACP
name: opencode-editor-e2e

on:
  push:
    paths:
      - ".github/workflows/opencode-editor-e2e.yml"
      - ".github/requirements/requirements-dev.txt"
      - "pyproject.toml"
      - "src/synapse_channel/claim_state.py"
      - "src/synapse_channel/cli_opencode_adapter.py"
      - "src/synapse_channel/file_claim_guard.py"
      - "src/synapse_channel/git/**"
      - "src/synapse_channel/mcp/**"
      - "src/synapse_channel/opencode_*.py"
      - "integrations/opencode/compatibility.json"
      - "tests/e2e/opencode_editors/**"
      - "tests/fixtures/opencode/**"
      - "tests/test_cli_e2e_opencode_editors.py"
      - "tests/test_opencode_compatibility_contract.py"
      - "tests/test_opencode_editor_workflow_contract.py"
      - "tests/test_opencode_editor_process_runner.py"
      - "tests/test_opencode_editor_process_group.py"
      - "tests/test_opencode_editor_governance_contract.py"
      - "tests/test_opencode_editor_trace_contract.py"
      - "tests/test_opencode_editor_trace_validation.py"
      - "tests/test_opencode_jetbrains_cleanup.py"
      - "tests/test_opencode_jetbrains_driver.py"
      - "tests/test_opencode_jetbrains_evidence.py"
      - "tests/test_opencode_jetbrains_lifecycle.py"
      - "tests/test_opencode_jetbrains_readiness.py"
      - "tests/test_opencode_jetbrains_setup.py"
      - "tests/test_opencode_jetbrains_timing.py"
      - "tests/test_opencode_jetbrains_x11_driver.py"
      - "tests/test_opencode_jetbrains_x11_focus.py"
      - "tests/test_opencode_jetbrains_x11_geometry.py"
      - "tests/test_opencode_zed_driver.py"
      - "tests/test_opencode_zed_readiness.py"
      - "tests/test_opencode_zed_timing.py"
      - "tests/test_opencode_zed_x11.py"
      - "tools/opencode_compatibility_contract.py"
      - "tools/opencode_editor_workflow_contract.py"
      - "docs/opencode.md"
      - "docs/mcp.md"
  pull_request:
    paths:
      - ".github/workflows/opencode-editor-e2e.yml"
      - ".github/requirements/requirements-dev.txt"
      - "pyproject.toml"
      - "src/synapse_channel/claim_state.py"
      - "src/synapse_channel/cli_opencode_adapter.py"
      - "src/synapse_channel/file_claim_guard.py"
      - "src/synapse_channel/git/**"
      - "src/synapse_channel/mcp/**"
      - "src/synapse_channel/opencode_*.py"
      - "integrations/opencode/compatibility.json"
      - "tests/e2e/opencode_editors/**"
      - "tests/fixtures/opencode/**"
      - "tests/test_cli_e2e_opencode_editors.py"
      - "tests/test_opencode_compatibility_contract.py"
      - "tests/test_opencode_editor_workflow_contract.py"
      - "tests/test_opencode_editor_process_runner.py"
      - "tests/test_opencode_editor_process_group.py"
      - "tests/test_opencode_editor_governance_contract.py"
      - "tests/test_opencode_editor_trace_contract.py"
      - "tests/test_opencode_editor_trace_validation.py"
      - "tests/test_opencode_jetbrains_cleanup.py"
      - "tests/test_opencode_jetbrains_driver.py"
      - "tests/test_opencode_jetbrains_evidence.py"
      - "tests/test_opencode_jetbrains_lifecycle.py"
      - "tests/test_opencode_jetbrains_readiness.py"
      - "tests/test_opencode_jetbrains_setup.py"
      - "tests/test_opencode_jetbrains_timing.py"
      - "tests/test_opencode_jetbrains_x11_driver.py"
      - "tests/test_opencode_jetbrains_x11_focus.py"
      - "tests/test_opencode_jetbrains_x11_geometry.py"
      - "tests/test_opencode_zed_driver.py"
      - "tests/test_opencode_zed_readiness.py"
      - "tests/test_opencode_zed_timing.py"
      - "tests/test_opencode_zed_x11.py"
      - "tools/opencode_compatibility_contract.py"
      - "tools/opencode_editor_workflow_contract.py"
      - "docs/opencode.md"
      - "docs/mcp.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  editor-client:
    name: ${{ matrix.client }} / OpenCode ACP
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ matrix.timeout }}
    # Every lane is a release gate. Neovim and Emacs exercise headless clients;
    # Zed and JetBrains exercise pinned real GUI clients through explicit X11
    # targets under Xvfb. A failed real editor turn must fail the workflow.
    strategy:
      fail-fast: false
      matrix:
        include:
          - client: neovim
            timeout: 20
          - client: emacs
            timeout: 25
          - client: zed
            timeout: 30
          - client: jetbrains
            timeout: 45
    env:
      SYNAPSE_EDITOR_E2E_CLIENT: ${{ matrix.client }}
      SYNAPSE_EDITOR_E2E_ARTIFACT_DIR: ${{ github.workspace }}/.e2e-artifacts/${{ matrix.client }}
      SYNAPSE_JETBRAINS_EULA_ACCEPTED_VERSION: ${{ vars.JETBRAINS_USER_AGREEMENT_ACCEPTED_VERSION }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install the hash-locked focused Python toolchain
        run: |
          set -euo pipefail
          python -m pip install --require-hashes -r .github/requirements/requirements-dev.txt
          python -m pip install -e . --no-deps
          python -m pip check
      - name: Install exact OpenCode 1.17.20
        env:
          OPENCODE_ARCHIVE_SHA256: b7100c0ad0980fba25d595123b4219a6fdc1fbd456dcb64859236741e199c564
          OPENCODE_BINARY_SHA256: 373af49ceba30c1b64e964463a64f8065103f942f240933a955f6c461e1a67f6
          OPENCODE_URL: https://github.com/anomalyco/opencode/releases/download/v1.17.20/opencode-linux-x64.tar.gz
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/opencode-linux-x64.tar.gz"
          bin_dir="$RUNNER_TEMP/opencode-1.17.20/bin"
          mkdir -p "$bin_dir"
          curl --fail --location --proto '=https' --proto-redir '=https' \
            --tlsv1.2 --retry 3 --output "$archive" "$OPENCODE_URL"
          printf '%s  %s\n' "$OPENCODE_ARCHIVE_SHA256" "$archive" \
            | sha256sum --check --strict
          tar -xzf "$archive" -C "$bin_dir"
          chmod 0755 "$bin_dir/opencode"
          printf '%s  %s\n' "$OPENCODE_BINARY_SHA256" "$bin_dir/opencode" \
            | sha256sum --check --strict
          test "$("$bin_dir/opencode" --version)" = "1.17.20"
          echo "OPENCODE_BIN=$bin_dir/opencode" >> "$GITHUB_ENV"
      - name: Install exact editor client and ACP integration
        env:
          ACP_EL_COMMIT: 5140f4121156707245567b8fc3072d4c3b5c867f
          AGENT_SHELL_COMMIT: 5351f9b0e983b00b2d21ecc41916635e2ed13ebe
          CODECOMPANION_COMMIT: a8a754491999d97695d6134e8d3d98effe6b2a98
          JETBRAINS_AI_ASSISTANT_SHA256: 8d5352e2c03fa419cc169c2e4dc1b9009247d52d641f4b8883029f347a61ceaf
          JETBRAINS_AI_ASSISTANT_URL: https://plugins.jetbrains.com/plugin/download?rel=true&updateId=1095694
          JETBRAINS_FULL_LINE_SHA256: 497bdf80d4600d947ebdbcdb440c7f68b21a048ec4fd77ad6a0171ae9d0bf0d8
          JETBRAINS_FULL_LINE_URL: https://plugins.jetbrains.com/plugin/download?rel=true&updateId=1095696
          NEOVIM_SHA256: 012bf3fcac5ade43914df3f174668bf64d05e049a4f032a388c027b1ebd78628
          NEOVIM_URL: https://github.com/neovim/neovim/releases/download/v0.12.4/nvim-linux-x86_64.tar.gz
          PLENARY_COMMIT: 74b06c6c75e4eeb3108ec01852001636d85a932b
          INTELLIJ_IDEA_SHA256: 3104d85d9507ff882065e3f8eb9506402b4a8129092d2682662bb6e9c4f063fc
          INTELLIJ_IDEA_URL: https://download.jetbrains.com/idea/idea-2026.1.4.tar.gz
          SHELL_MAKER_COMMIT: 071c6df3ca22a2f4c0daa689848ac9bd21bf4e2b
          ZED_SHA256: 55eb5ef8b211c950a9009da30b7f603d2c9d2c80b207f9de94ffab6d31d58f8c
          ZED_URL: https://github.com/zed-industries/zed/releases/download/v1.10.3/zed-linux-x86_64.tar.gz
        run: |
          set -euo pipefail
          clone_commit() {
            url="$1"
            commit="$2"
            destination="$3"
            git init --quiet "$destination"
            git -C "$destination" remote add origin "$url"
            git -C "$destination" fetch --quiet --depth 1 origin "$commit"
            git -C "$destination" checkout --quiet --detach FETCH_HEAD
            test "$(git -C "$destination" rev-parse HEAD)" = "$commit"
          }
          case "$SYNAPSE_EDITOR_E2E_CLIENT" in
            neovim)
              archive="$RUNNER_TEMP/nvim-linux-x86_64.tar.gz"
              curl --fail --location --proto '=https' --proto-redir '=https' \
                --tlsv1.2 --retry 3 --output "$archive" "$NEOVIM_URL"
              printf '%s  %s\n' "$NEOVIM_SHA256" "$archive" | sha256sum --check --strict
              tar -xzf "$archive" -C "$RUNNER_TEMP"
              clone_commit https://github.com/olimorris/codecompanion.nvim.git \
                "$CODECOMPANION_COMMIT" "$RUNNER_TEMP/codecompanion.nvim"
              clone_commit https://github.com/nvim-lua/plenary.nvim.git \
                "$PLENARY_COMMIT" "$RUNNER_TEMP/plenary.nvim"
              echo "SYNAPSE_NVIM_BIN=$RUNNER_TEMP/nvim-linux-x86_64/bin/nvim" >> "$GITHUB_ENV"
              echo "SYNAPSE_CODECOMPANION_DIR=$RUNNER_TEMP/codecompanion.nvim" >> "$GITHUB_ENV"
              echo "SYNAPSE_PLENARY_DIR=$RUNNER_TEMP/plenary.nvim" >> "$GITHUB_ENV"
              ;;
            emacs)
              sudo apt-get update
              sudo apt-get install --no-install-recommends --yes emacs-nox
              test "$(emacs --batch -Q --eval '(princ emacs-version)')" = "29.3"
              clone_commit https://github.com/xenodium/shell-maker.git \
                "$SHELL_MAKER_COMMIT" "$RUNNER_TEMP/shell-maker"
              clone_commit https://github.com/xenodium/acp.el.git \
                "$ACP_EL_COMMIT" "$RUNNER_TEMP/acp.el"
              clone_commit https://github.com/xenodium/agent-shell.git \
                "$AGENT_SHELL_COMMIT" "$RUNNER_TEMP/agent-shell"
              echo "SYNAPSE_EMACS_BIN=$(command -v emacs)" >> "$GITHUB_ENV"
              echo "SYNAPSE_SHELL_MAKER_DIR=$RUNNER_TEMP/shell-maker" >> "$GITHUB_ENV"
              echo "SYNAPSE_ACP_EL_DIR=$RUNNER_TEMP/acp.el" >> "$GITHUB_ENV"
              echo "SYNAPSE_AGENT_SHELL_DIR=$RUNNER_TEMP/agent-shell" >> "$GITHUB_ENV"
              ;;
            zed)
              sudo apt-get update
              sudo apt-get install --no-install-recommends --yes \
                imagemagick libasound2t64 libegl1 libfontconfig1 libvulkan1 \
                libwayland-client0 libx11-xcb1 libxcb1 libxkbcommon-x11-0 \
                wmctrl xdotool xvfb
              archive="$RUNNER_TEMP/zed-linux-x86_64.tar.gz"
              curl --fail --location --proto '=https' --proto-redir '=https' \
                --tlsv1.2 --retry 3 --output "$archive" "$ZED_URL"
              printf '%s  %s\n' "$ZED_SHA256" "$archive" | sha256sum --check --strict
              mkdir "$RUNNER_TEMP/zed-1.10.3"
              tar -xzf "$archive" -C "$RUNNER_TEMP/zed-1.10.3"
              zed_bin=$(find "$RUNNER_TEMP/zed-1.10.3" -type f -path '*/bin/zed' -print -quit)
              test -n "$zed_bin"
              chmod 0755 "$zed_bin"
              echo "SYNAPSE_ZED_BIN=$zed_bin" >> "$GITHUB_ENV"
              ;;
            jetbrains)
              test "$SYNAPSE_JETBRAINS_EULA_ACCEPTED_VERSION" = "2.0"
              sudo apt-get update
              sudo apt-get install --no-install-recommends --yes \
                imagemagick libasound2t64 libfreetype6 libxi6 libxrender1 \
                libxtst6 libxkbcommon-x11-0 wmctrl x11-utils xdotool xvfb
              for executable in import wmctrl xdotool xprop xwininfo xvfb-run; do
                command -v "$executable"
              done
              dpkg-query --show --showformat='${Package}=${Version}\n' \
                imagemagick libasound2t64 libfreetype6 libxi6 libxrender1 \
                libxtst6 libxkbcommon-x11-0 wmctrl x11-utils xdotool xvfb
              archive="$RUNNER_TEMP/idea-2026.1.4.tar.gz"
              ai_assistant="$RUNNER_TEMP/ai-assistant-261.26222.65.zip"
              full_line="$RUNNER_TEMP/full-line-261.26222.65.zip"
              curl --fail --location --proto '=https' --proto-redir '=https' \
                --tlsv1.2 --retry 3 --output "$archive" "$INTELLIJ_IDEA_URL"
              printf '%s  %s\n' "$INTELLIJ_IDEA_SHA256" "$archive" \
                | sha256sum --check --strict
              mkdir "$RUNNER_TEMP/idea-2026.1.4"
              tar -xzf "$archive" -C "$RUNNER_TEMP/idea-2026.1.4"
              idea_bin=$(find "$RUNNER_TEMP/idea-2026.1.4" \
                -type f -path '*/bin/idea' -print -quit)
              product_info=$(find "$RUNNER_TEMP/idea-2026.1.4" \
                -type f -name product-info.json -print -quit)
              test -n "$idea_bin"
              test -x "$idea_bin"
              test -n "$product_info"
              jq -e \
                '.name == "IntelliJ IDEA" and .version == "2026.1.4" and
                 .buildNumber == "261.26222.65" and .productCode == "IU"' \
                "$product_info" >/dev/null
              curl --fail --location --proto '=https' --proto-redir '=https' \
                --tlsv1.2 --retry 3 --output "$ai_assistant" \
                "$JETBRAINS_AI_ASSISTANT_URL"
              printf '%s  %s\n' "$JETBRAINS_AI_ASSISTANT_SHA256" "$ai_assistant" \
                | sha256sum --check --strict
              curl --fail --location --proto '=https' --proto-redir '=https' \
                --tlsv1.2 --retry 3 --output "$full_line" "$JETBRAINS_FULL_LINE_URL"
              printf '%s  %s\n' "$JETBRAINS_FULL_LINE_SHA256" "$full_line" \
                | sha256sum --check --strict
              mkdir "$RUNNER_TEMP/jetbrains-plugins"
              unzip -q "$ai_assistant" -d "$RUNNER_TEMP/jetbrains-plugins"
              unzip -q "$full_line" -d "$RUNNER_TEMP/jetbrains-plugins"
              test -f "$RUNNER_TEMP/jetbrains-plugins/ml-llm/lib/ml-llm.jar"
              test -f "$RUNNER_TEMP/jetbrains-plugins/fullLine/lib/fullLine.jar"
              ai_assistant_xml=$(unzip -p \
                "$RUNNER_TEMP/jetbrains-plugins/ml-llm/lib/ml-llm.jar" \
                META-INF/plugin.xml)
              full_line_xml=$(unzip -p \
                "$RUNNER_TEMP/jetbrains-plugins/fullLine/lib/fullLine.jar" \
                META-INF/plugin.xml)
              grep -Fq '<id>com.intellij.ml.llm</id>' <<< "$ai_assistant_xml"
              grep -Fq '<version>261.26222.65</version>' <<< "$ai_assistant_xml"
              grep -Fq \
                '<idea-version since-build="261.26222.65" until-build="261.26222.65" />' \
                <<< "$ai_assistant_xml"
              grep -Fq '<plugin id="org.jetbrains.completion.full.line" />' \
                <<< "$ai_assistant_xml"
              grep -Fq \
                '<registryKey key="llm.chat.new.chat.and.agent.selector.enabled" defaultValue="false" restartRequired="true"' \
                <<< "$ai_assistant_xml"
              grep -Fq '<action id="NewChatAgentSelectorAction"' \
                <<< "$ai_assistant_xml"
              grep -Fq '<action id="AIAssistant.Chat.SendActions.Send"' \
                <<< "$ai_assistant_xml"
              grep -Fq '<id>org.jetbrains.completion.full.line</id>' <<< "$full_line_xml"
              grep -Fq '<version>261.26222.65</version>' <<< "$full_line_xml"
              grep -Fq \
                '<idea-version since-build="261.26222.65" until-build="261.26222.65" />' \
                <<< "$full_line_xml"
              echo "SYNAPSE_JETBRAINS_BIN=$idea_bin" >> "$GITHUB_ENV"
              echo "SYNAPSE_JETBRAINS_PLUGINS=$RUNNER_TEMP/jetbrains-plugins" >> "$GITHUB_ENV"
              ;;
          esac
      - name: Focused editor contract checks
        run: |
          set -euo pipefail
          files=(
            tests/e2e/__init__.py
            tests/e2e/opencode_editors/__init__.py
            tests/e2e/opencode_editors/acp_trace_proxy.py
            tests/e2e/opencode_editors/editor_process_runner.py
            tests/e2e/opencode_editors/governance_contract.py
            tests/e2e/opencode_editors/jetbrains_client.py
            tests/e2e/opencode_editors/jetbrains_cleanup.py
            tests/e2e/opencode_editors/jetbrains_evidence.py
            tests/e2e/opencode_editors/jetbrains_lifecycle.py
            tests/e2e/opencode_editors/jetbrains_readiness.py
            tests/e2e/opencode_editors/jetbrains_setup.py
            tests/e2e/opencode_editors/jetbrains_timing.py
            tests/e2e/opencode_editors/jetbrains_x11_driver.py
            tests/e2e/opencode_editors/jetbrains_x11_focus.py
            tests/e2e/opencode_editors/jetbrains_x11_geometry.py
            tests/e2e/opencode_editors/process_group.py
            tests/e2e/opencode_editors/trace_contract.py
            tests/e2e/opencode_editors/zed_client.py
            tests/e2e/opencode_editors/zed_readiness.py
            tests/e2e/opencode_editors/zed_timing.py
            tests/e2e/opencode_editors/zed_x11.py
            tests/test_cli_e2e_opencode_editors.py
            tests/test_opencode_compatibility_contract.py
            tests/test_opencode_editor_workflow_contract.py
            tests/test_opencode_editor_process_runner.py
            tests/test_opencode_editor_process_group.py
            tests/test_opencode_editor_governance_contract.py
            tests/test_opencode_jetbrains_cleanup.py
            tests/test_opencode_jetbrains_driver.py
            tests/test_opencode_jetbrains_evidence.py
            tests/test_opencode_jetbrains_lifecycle.py
            tests/test_opencode_jetbrains_readiness.py
            tests/test_opencode_jetbrains_setup.py
            tests/test_opencode_jetbrains_timing.py
            tests/test_opencode_jetbrains_x11_driver.py
            tests/test_opencode_jetbrains_x11_focus.py
            tests/test_opencode_jetbrains_x11_geometry.py
            tests/test_opencode_zed_driver.py
            tests/test_opencode_zed_readiness.py
            tests/test_opencode_zed_timing.py
            tests/test_opencode_zed_x11.py
            tests/test_opencode_editor_trace_contract.py
            tests/test_opencode_editor_trace_validation.py
            tools/opencode_compatibility_contract.py
            tools/opencode_editor_workflow_contract.py
          )
          ruff check "${files[@]}"
          ruff format --check "${files[@]}"
          mypy --strict "${files[@]}"
      - name: Real editor client to OpenCode ACP turn
        run: |
          set -euo pipefail
          if [[ "$SYNAPSE_EDITOR_E2E_CLIENT" == "zed" \
            || "$SYNAPSE_EDITOR_E2E_CLIENT" == "jetbrains" ]]; then
            xvfb-run -a -s '-screen 0 1920x1080x24' \
              pytest tests/test_opencode_editor_process_group.py \
                tests/test_opencode_editor_process_runner.py \
                tests/test_opencode_editor_governance_contract.py \
                tests/test_opencode_jetbrains_cleanup.py \
                tests/test_opencode_jetbrains_driver.py \
                tests/test_opencode_jetbrains_evidence.py \
                tests/test_opencode_jetbrains_lifecycle.py \
                tests/test_opencode_jetbrains_readiness.py \
                tests/test_opencode_jetbrains_setup.py \
                tests/test_opencode_jetbrains_timing.py \
                tests/test_opencode_jetbrains_x11_driver.py \
                tests/test_opencode_jetbrains_x11_focus.py \
                tests/test_opencode_jetbrains_x11_geometry.py \
                tests/test_opencode_zed_driver.py \
                tests/test_opencode_zed_readiness.py \
                tests/test_opencode_zed_timing.py \
                tests/test_opencode_zed_x11.py \
                tests/test_opencode_editor_trace_contract.py \
                tests/test_opencode_editor_trace_validation.py \
                tests/test_cli_e2e_opencode_editors.py
          else
            pytest tests/test_opencode_editor_process_group.py \
              tests/test_opencode_editor_process_runner.py \
              tests/test_opencode_editor_governance_contract.py \
              tests/test_opencode_jetbrains_cleanup.py \
              tests/test_opencode_jetbrains_driver.py \
              tests/test_opencode_jetbrains_evidence.py \
              tests/test_opencode_jetbrains_lifecycle.py \
              tests/test_opencode_jetbrains_readiness.py \
              tests/test_opencode_jetbrains_setup.py \
              tests/test_opencode_jetbrains_timing.py \
              tests/test_opencode_jetbrains_x11_driver.py \
              tests/test_opencode_jetbrains_x11_focus.py \
              tests/test_opencode_jetbrains_x11_geometry.py \
              tests/test_opencode_zed_driver.py \
              tests/test_opencode_zed_readiness.py \
              tests/test_opencode_zed_timing.py \
              tests/test_opencode_zed_x11.py \
              tests/test_opencode_editor_trace_contract.py \
              tests/test_opencode_editor_trace_validation.py \
              tests/test_cli_e2e_opencode_editors.py
          fi
      - name: Upload bounded ACP evidence and GUI diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: opencode-editor-e2e-${{ matrix.client }}
          path: ${{ env.SYNAPSE_EDITOR_E2E_ARTIFACT_DIR }}
          if-no-files-found: error
          retention-days: 14
