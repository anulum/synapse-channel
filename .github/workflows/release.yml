# SYNAPSE CHANNEL — release the exact distributions already published to PyPI
name: release

# A publish success may be followed by a visible, rerunnable release failure:
# PyPI is then live while the GitHub Release is absent. Recovery reruns this
# workflow against the same immutable artifact; it never rebuilds distributions.
on:
  workflow_run:
    workflows: [publish]
    types: [completed]

permissions: {}

jobs:
  release:
    # publish.yml runs only on refs/tags/v*, so a successful publish run is
    # always a versioned tag build. We deliberately do NOT gate on
    # workflow_run.head_branch: for tag events GitHub resolves it to the branch
    # containing the commit (e.g. main), not the tag, which silently skipped
    # this job. The tag is derived from the published commit below instead.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true
      - name: Resolve and validate the release tag
        id: tag
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # Derive the tag from the published commit rather than the unreliable
          # workflow_run.head_branch, and fail closed if no version tag points
          # at it (e.g. a non-semver publish ref).
          tag="$(git tag --points-at "$HEAD_SHA" --sort=-v:refname \
                 | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$' \
                 | head -n 1)"
          if [[ -z "$tag" ]]; then
            echo "no version tag points at published commit $HEAD_SHA" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "resolved release tag: $tag"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-dist
          path: release-artifact/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-provenance
          path: release-provenance/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Verify the exact release payload and digests
        working-directory: release-artifact
        run: |
          sha256sum --check --strict SHA256SUMS
          diff -u \
            <(sed -E 's/^[0-9a-f]{64}  //' SHA256SUMS | sort) \
            <(find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\n' | sort)
      - name: Verify portable SLSA provenance before attaching assets
        env:
          PROVENANCE_BUNDLE: release-provenance/synapse-channel-${{ steps.tag.outputs.tag }}-provenance.sigstore.json
          SOURCE_REF: refs/tags/${{ steps.tag.outputs.tag }}
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          while read -r _ artifact; do
            gh attestation verify "release-artifact/$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --bundle "$PROVENANCE_BUNDLE" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/publish.yml" \
              --source-ref "$SOURCE_REF" \
              --source-digest "$SOURCE_SHA" \
              --deny-self-hosted-runners
          done < release-artifact/SHA256SUMS
      - name: Extract changelog for this tag
        env:
          SOURCE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          version="${SOURCE_TAG#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {p=1; next}
            p && /^## \[/ {exit}
            p {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "Release notes:" && cat RELEASE_NOTES.md
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          body_path: RELEASE_NOTES.md
          files: |
            release-artifact/*
            release-provenance/*
