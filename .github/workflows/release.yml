# SYNAPSE CHANNEL — cut a GitHub Release on a version tag
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r .github/requirements/requirements-tools.txt
      - run: python -m build
      - name: Generate CycloneDX SBOM for the built wheel
        run: |
          python -m venv .sbom-venv
          .sbom-venv/bin/python -m pip install --upgrade pip
          .sbom-venv/bin/python -m pip install dist/*.whl
          python -m pip install --require-hashes -r .github/requirements/requirements-sbom.txt
          cyclonedx-py environment .sbom-venv/bin/python \
            --output-format JSON \
            --output-file "synapse-channel-${GITHUB_REF_NAME}-sbom.cdx.json"
          echo "SBOM components:" && \
            python -c "import json,sys;d=json.load(open('synapse-channel-${GITHUB_REF_NAME}-sbom.cdx.json'));print(len(d.get('components',[])),'components')"
      - name: Extract changelog for this tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {p=1; next}
            p && /^## \[/ {exit}
            p {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "Release notes:" && cat RELEASE_NOTES.md
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          body_path: RELEASE_NOTES.md
          files: |
            dist/*
            synapse-channel-${{ github.ref_name }}-sbom.cdx.json
