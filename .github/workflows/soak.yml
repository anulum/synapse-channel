# SYNAPSE CHANNEL — scheduled bounded soak of waiter/liveness bookkeeping
name: soak

on:
  schedule:
    - cron: "41 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # A separate job name (not "ci") keeps this an advisory status, never a
  # branch-protection required check. It runs the same soak the ordinary suite
  # runs, at a much larger cycle count, to catch a slow waiter/liveness leak.
  soak-waiter-liveness:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r .github/requirements/requirements-dev.txt
      - run: python -m pip install -e . --no-deps
      - name: Soak the waiter/liveness bookkeeping under sustained connect churn
        env:
          SYNAPSE_SOAK_ITERATIONS: "1000"
        run: python -m pytest tests/test_waiter_liveness_soak.py
