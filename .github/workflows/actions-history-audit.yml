# SYNAPSE CHANNEL — read-only recent GitHub Actions history audit
name: actions-history-audit

on:
  schedule:
    # Weekly Monday 06:10 UTC, after link and commit-history checks.
    - cron: "10 6 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  recent-main-history:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Collect the latest 500 main-branch runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh run list
          --repo "${{ github.repository }}"
          --branch main
          --limit 500
          --json databaseId,conclusion,status,workflowName,headSha,headBranch,createdAt,event
          > actions-history.json
      - name: Fail on unresolved workflow history
        run: >-
          python tools/audit_github_actions_history.py
          --input actions-history.json
          --exclude-workflow actions-history-audit
          > actions-history-audit.json
      - name: Upload raw and classified evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: actions-history-audit
          path: actions-history*.json
          if-no-files-found: error
          retention-days: 30
