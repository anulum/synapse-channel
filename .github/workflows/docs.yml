# SYNAPSE CHANNEL — build and deploy the documentation site
name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/synapse_channel/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

# Serialise Pages deployments: rapid successive pushes used to collide on the
# deploy-pages step ("Deployment request failed … due to in progress deployment"),
# failing the run. One docs run deploys at a time; a newer one queues rather than
# racing. cancel-in-progress is false so an in-flight deployment is never interrupted.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r .github/requirements/requirements-dev.txt
      - run: python -m pip install -e . --no-deps
      - run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      # The Pages backend intermittently answers "Deployment failed, try again
      # later" on a first attempt and succeeds on a delayed retry — observed
      # repeatedly (four pushes on 2026-07-03 alone). Attempt once, wait out
      # the flake window, retry once; fail only when both attempts fail.
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure'
        run: sleep 300
      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
