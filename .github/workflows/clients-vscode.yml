name: clients-vscode

on:
  push:
    paths:
      - "clients/vscode/**"
      - ".github/workflows/clients-vscode.yml"
  pull_request:
    paths:
      - "clients/vscode/**"
      - ".github/workflows/clients-vscode.yml"

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/vscode
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: clients/vscode/package-lock.json
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install headless editor dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes xauth xdotool xvfb
      - run: npm ci
      - name: Verify pinned distribution tools and dependency audit
        run: |
          npm exec -- vsce --version
          npm exec -- ovsx --version
          npm audit --audit-level=low
      - name: Install the real hub for Extension Development Host acceptance
        run: |
          python -m pip install --require-hashes -r ../../.github/requirements/requirements.txt
          python -m pip install -e ../.. --no-deps
      - run: npm run typecheck
      - run: npm run coverage
      - run: xvfb-run -a npm run test:integration
      - run: npm run build
      - run: npm run package:vsix
      - name: Verify immutable registry listing links
        if: github.event_name == 'push'
        run: npm run verify:registry-links
      - name: Verify byte-reproducible VSIX
        run: |
          first=$(sha256sum dist/synapse-channel-vscode.vsix | cut -d' ' -f1)
          npm run package:vsix
          second=$(sha256sum dist/synapse-channel-vscode.vsix | cut -d' ' -f1)
          test "$first" = "$second"
      - name: Verify VSIX runtime payload
        run: |
          unzip -t dist/synapse-channel-vscode.vsix
          unzip -Z1 dist/synapse-channel-vscode.vsix | sort > /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/package.json' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/out/extension.js' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/out/claimGutter.js' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/out/claimGutterModel.js' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/out/configurationReconnect.js' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/out/evidenceModel.js' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/out/evidenceTree.js' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/out/fleetController.js' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/out/connectionState.js' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/out/hubAuth.js' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/out/hubClosePolicy.js' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/out/hubEvidenceProtocol.js' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/out/hubJson.js' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/out/hubProtocol.js' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/out/hubTransport.js' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/out/hubTransportTimers.js' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/out/hubTransportTypes.js' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/out/reconnectPolicy.js' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/out/workspaceScope.js' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/media/claim-mine-light.svg' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/media/claim-mine-dark.svg' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/media/claim-other-light.svg' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/media/claim-other-dark.svg' /tmp/synapse-vsix-files.txt
          grep -Fx 'extension/LICENSE.txt' /tmp/synapse-vsix-files.txt
          if grep -Eq '^extension/(src|test|node_modules|out-test)/' /tmp/synapse-vsix-files.txt; then
            echo 'VSIX contains development-only trees' >&2
            exit 1
          fi
      - name: Verify stateful packaged 0.2.0 to 0.3.0 upgrade
        run: |
          baseline=b72fc22975021596c4ab34e4d6b9c3842fbc971a
          git cat-file -e "${baseline}^{commit}"
          old_root=$(mktemp -d "$RUNNER_TEMP/synapse-vscode-old.XXXXXX")
          trap 'rm -rf "$old_root"' EXIT
          git -C ../.. archive "$baseline" clients/vscode | tar -x -C "$old_root" --strip-components=2
          npm --prefix "$old_root" ci
          npm --prefix "$old_root" run package:vsix
          SYNAPSE_VSCODE_OLD_VSIX="$old_root/dist/synapse-channel-vscode.vsix" \
          SYNAPSE_VSCODE_CURRENT_VSIX="$PWD/dist/synapse-channel-vscode.registry.vsix" \
            xvfb-run -a npm run test:upgrade
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: synapse-channel-vscode-vsix
          path: |
            clients/vscode/dist/synapse-channel-vscode.registry.vsix
            clients/vscode/dist/synapse-channel-vscode.vsix
          if-no-files-found: error
          retention-days: 14
