# SYNAPSE CHANNEL — scheduled property-based fuzzing
name: fuzz

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wire-and-persistence:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r .github/requirements/requirements-dev.txt
      - run: python -m pip install -e . --no-deps
      - name: Run deterministic decoder corpus
        env:
          PYTHONPATH: src
        run: python tools/fuzz_protocol_decode.py --smoke
      - name: Fuzz wire decoder and event-store persistence
        env:
          SYNAPSE_FUZZ_EXAMPLES: "1000"
        run: >-
          python -m pytest
          tests/test_fuzz_wire_inputs.py
          tests/test_fuzz_persistence_inputs.py
