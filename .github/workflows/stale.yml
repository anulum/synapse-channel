# SYNAPSE CHANNEL — stale issue and PR housekeeping
name: stale

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,roadmap"
          exempt-pr-labels: "pinned,security"
          stale-issue-message: >-
            This issue has had no activity for 60 days and will be closed in 14
            days if nothing further happens. Comment to keep it open.
          stale-pr-message: >-
            This pull request has had no activity for 60 days and will be closed
            in 14 days if nothing further happens.
