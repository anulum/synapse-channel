# SYNAPSE CHANNEL — continuous integration
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r .github/requirements/requirements-dev.txt
      - run: python -m pip install -e . --no-deps
      - run: ruff check src tests benchmarks examples
      - run: ruff format --check src tests benchmarks examples
      - run: python -m bandit -q -r src -c pyproject.toml
      - name: Capability snapshot drift
        run: python tools/capability_manifest.py --check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r .github/requirements/requirements-dev.txt
      - run: python -m pip install -e . --no-deps
      - run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      # SoftHSM2 provides a PKCS#11 module and swtpm a software TPM 2.0, so the at-rest hardware
      # key backends run (not skip); libtss2-dev builds tpm2-pytss (sdist-only, no wheel).
      - run: >-
          sudo apt-get update && sudo apt-get install -y
          softhsm2 swtpm swtpm-tools tpm2-tools libtss2-dev
      - run: python -m pip install --require-hashes -r .github/requirements/requirements-dev.txt
      - run: python -m pip install -e . --no-deps
      - run: pytest --cov=synapse_channel --cov-report=term-missing --cov-report=xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
      - name: Import check
        run: python -c "import synapse_channel; assert synapse_channel.__version__"

  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r .github/requirements/requirements-tools.txt
      - run: reuse lint

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r .github/requirements/requirements.txt
      - name: Audit dependencies for known vulnerabilities
        run: python -m pip_audit . --desc --progress-spinner=off

  git-hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r .github/requirements/requirements.txt
      - name: Auto-release hooks install and self-test
        run: |
          set -euo pipefail
          export PYTHONPATH="$GITHUB_WORKSPACE/src"
          synapse_bin="$RUNNER_TEMP/synapse-dev"
          cat > "$synapse_bin" <<'PY'
          #!/usr/bin/env python
          from synapse_channel.cli import main

          raise SystemExit(main())
          PY
          chmod +x "$synapse_bin"
          scratch="$(mktemp -d)"
          git -C "$scratch" init -q
          # A fresh repo has no auto-release hooks: `git-hook test` must fail (non-zero),
          # so a broken or no-op install is caught instead of silently passing.
          if (cd "$scratch" && "$synapse_bin" git-hook test); then
            echo "::error::git-hook test passed on a repo with no auto-release hooks installed"
            exit 1
          fi
          # After `git-init`, both hooks are installed and their baked-in synapse path
          # resolves, so `git-hook test` must pass (exit 0).
          (cd "$scratch" && "$synapse_bin" git-init --name ci --synapse-bin "$synapse_bin")
          (cd "$scratch" && "$synapse_bin" git-hook test)
          rm -rf "$scratch"
