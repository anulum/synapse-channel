# SYNAPSE CHANNEL — continuous integration
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # A main push gets a commit-specific group and cannot cancel an earlier head.
  # Pull-request and manual runs keep replacing stale work on their shared ref.
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r .github/requirements/requirements-dev.txt
      - run: python -m pip install -e . --no-deps
      - run: ruff check src tests benchmarks examples
      - run: ruff format --check src tests benchmarks examples
      - run: python -m bandit -q -r src -c pyproject.toml
      - name: Capability snapshot drift
        run: python tools/capability_manifest.py --check
      - name: Cockpit CI and npm-lock integrity
        run: python tools/check_cockpit_ci.py --check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r .github/requirements/requirements-dev.txt
      - run: python -m pip install -e . --no-deps
      - run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      # SoftHSM2 provides a PKCS#11 module and swtpm a software TPM 2.0, so the at-rest hardware
      # key backends run (not skip); libtss2-dev builds tpm2-pytss (sdist-only, no wheel).
      # The runner ships Microsoft/Azure apt sources whose signing intermittently breaks
      # ("repository is no longer signed"), which fails apt-get update; none of the packages below
      # come from them, so drop those sources first to keep the setup resilient to that flake.
      - run: >-
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/azure-cli.sources
          && sudo apt-get update && sudo apt-get install -y
          softhsm2 swtpm swtpm-tools tpm2-tools libtss2-dev
      - run: python -m pip install --require-hashes -r .github/requirements/requirements-dev.txt
      - run: python -m pip install -e . --no-deps
      # tpm2-pytss is sdist-only and needs the TSS2 headers, so it is kept out of the hash-locked
      # dev requirements (which every job installs) and built here, where libtss2-dev is present, to
      # exercise the TPM 2.0 backend against swtpm rather than skip it. Pinned exactly (verified at
      # source, PyPI 2.3.0) to stop version-range drift into an unvetted release; full hash-locking
      # would need a compiled dependency closure at build time and is tracked separately.
      - run: python -m pip install 'tpm2-pytss==2.3.0'
      # sqlcipher3-binary lives in the optional [sqlcipher] extra, not the hash-locked dev
      # requirements, so without this install the whole SQLCipher at-rest suite (persistence,
      # session capability, reliability workflow, multihub MCP, encrypt-key) silently skips.
      # Manylinux wheels exist for every matrix Python (cp310–cp314).
      - run: python -m pip install 'sqlcipher3-binary==0.6.0'
      - run: pytest --cov=synapse_channel --cov-report=term-missing --cov-report=xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
      - name: Import check
        run: python -c "import synapse_channel; assert synapse_channel.__version__"

  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r .github/requirements/requirements-tools.txt
      - run: reuse lint

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r .github/requirements/requirements.txt
      - name: Audit dependencies for known vulnerabilities
        run: python -m pip_audit . --desc --progress-spinner=off

  git-hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --require-hashes -r .github/requirements/requirements.txt
      - name: Auto-release hooks install and self-test
        run: |
          set -euo pipefail
          export PYTHONPATH="$GITHUB_WORKSPACE/src"
          synapse_bin="$RUNNER_TEMP/synapse-dev"
          cat > "$synapse_bin" <<'PY'
          #!/usr/bin/env python
          from synapse_channel.cli import main

          raise SystemExit(main())
          PY
          chmod +x "$synapse_bin"
          scratch="$(mktemp -d)"
          git -C "$scratch" init -q
          # A fresh repo has no auto-release hooks: `git-hook test` must fail (non-zero),
          # so a broken or no-op install is caught instead of silently passing.
          if (cd "$scratch" && "$synapse_bin" git-hook test); then
            echo "::error::git-hook test passed on a repo with no auto-release hooks installed"
            exit 1
          fi
          # After `git-init`, both hooks are installed and their baked-in synapse path
          # resolves, so `git-hook test` must pass (exit 0).
          (cd "$scratch" && "$synapse_bin" git-init --name ci --synapse-bin "$synapse_bin")
          (cd "$scratch" && "$synapse_bin" git-hook test)
          rm -rf "$scratch"

  # Single required status check for branch protection. It always runs (even when an
  # upstream job fails), so the `ci` context posts on every pull request and push,
  # and it fails unless every gated job succeeded — matrix-drift-proof, unlike pinning
  # each individual job as a required context.
  ci:
    name: ci
    needs: [lint, typecheck, test, reuse, audit, git-hooks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require every gated job to succeed
        run: |
          set -euo pipefail
          results="${{ join(needs.*.result, ' ') }}"
          echo "gated job results: ${results}"
          for result in ${results}; do
            if [ "${result}" != "success" ]; then
              echo "::error::a required ci job did not succeed (${result})"
              exit 1
            fi
          done
          echo "all required ci jobs succeeded"
