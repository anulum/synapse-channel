# SYNAPSE CHANNEL — feature request form
name: Feature request
description: Propose a change or addition to the coordination bus.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem first, then the proposed solution. Features start
        with an agreed design — see GOVERNANCE.md.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the bus does not support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How might it work? Note any new message types or CLI surface.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you set them aside.
    validations:
      required: false
