# SYNAPSE CHANNEL — bug report form
name: Bug report
description: Report a defect so it can be reproduced and fixed.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please do not include secrets or private data.
        For security issues, follow SECURITY.md instead of filing a public issue.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `synapse --version`.
      placeholder: "synapse-channel 0.17.0"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: A minimal sequence of commands or code that triggers the issue.
      render: shell
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, operating system, and how the hub was started.
    validations:
      required: false
