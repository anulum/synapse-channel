# SYNAPSE CHANNEL — documentation site configuration
site_name: SYNAPSE CHANNEL
site_description: Local-first multi-agent coordination bus
site_author: Miroslav Šotek
site_url: https://anulum.github.io/synapse-channel
repo_url: https://github.com/anulum/synapse-channel
repo_name: anulum/synapse-channel
copyright: "&copy; 1998–2026 Miroslav Šotek &middot; <a href='https://www.anulum.li'>anulum.li</a>"

exclude_docs: |
  internal/
  _generated/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            members_order: source

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick start: quickstart.md
  - Use cases: use-cases.md
  - How it compares: comparison.md
  - Integration demos: integration-demos.md
  - Go client: go-client.md
  - TypeScript/JavaScript client: js-client.md
  - Cross-agent adapter kits: cross-agent-adapter-kits.md
  - Coordination model: coordination-model.md
  - Agent Air Traffic Control: agent-air-traffic-control.md
  - Wire protocol: protocol.md
  - Bounded streaming responses: streaming.md
  - Declarative workflows: workflows.md
  - Studio: studio.md
  - CLI reference: cli.md
  - Public surface and stability: public-surface.md
  - MCP server: mcp.md
  - Git-native claims: git-claims.md
  - Policy engine: policy-engine.md
  - Agent trust graph: agent-trust-graph.md
  - Paranoid mode: paranoid-mode.md
  - At-rest encryption: at-rest-encryption.md
  - Encrypted channels: end-to-end-encrypted-channels.md
  - Private channels: private-channels.md
  - Differential privacy blackboard: differential-privacy-blackboard.md
  - Signed events and mTLS: signed-events-mtls.md
  - Per-message authentication: per-message-authentication.md
  - Identity and ACL: identity-and-acl.md
  - Signed capability cards: signed-capability-cards.md
  - Sandboxed tools and marketplace: sandboxed-tools-and-marketplace.md
  - WASM sandbox getting started: wasm-sandbox-getting-started.md
  - Federated trust model: federated-trust-model.md
  - Multi-hub sync (CRDT) research: multi-hub-sync.md
  - Managed GitHub App (design): managed-github-app.md
  - Recipes: recipes.md
  - Examples: examples.md
  - Deployment: deployment.md
  - A2A validation receipts: a2a-validation-receipts.md
  - Benchmarks: benchmarks.md
  - API reference: api.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md
  - Glossary: glossary.md
  - Changelog: changelog.md
  - Commercial use: commercial.md
