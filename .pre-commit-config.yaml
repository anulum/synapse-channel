# SYNAPSE CHANNEL — pre-commit configuration
default_install_hook_types: [pre-commit, commit-msg]
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
  - repo: https://github.com/crate-ci/typos
    rev: v1.46.1
    hooks:
      - id: typos
        args: [--config, _typos.toml]
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: commit-trailers
        name: seat, authorship, and commit-subject policy
        entry: python tools/check_commit_trailers.py
        language: system
        stages: [commit-msg]
      - id: version-sync
        name: version is in sync (pyproject == __init__/README/CITATION)
        entry: python tools/check_version_sync.py
        language: system
        files: ^(pyproject\.toml|src/synapse_channel/__init__\.py|README\.md|CITATION\.cff)$
        pass_filenames: false
